    releaseNotes: "It's time for a refresh! We've made some updates to the app UI\
      \ as a result of upgrading to the new iOS SDK. Here's what's new:\n\n\u2022\
      \ Incorporated Liquid Glass styling and elements throughout the app!\n\u2022\
      \ Added a new Personalization section (under Settings) to customize how the\
      \ app looks and feels.\n\u2022 The Favorites page has moved. You can now find\
      \ your favorite devices and apps pinned to the top of the Devices and Apps pages\
      \ respectively.\n\u2022 Gracefully handled errors encountered when connecting\
      \ to a Windows Cloud Input Protection-enabled PC endpoint.\n\nWe've also added\
      \ support for audio and video stream optimizations when connecting to Azure\
      \ Virtual Desktop (AVD) session hosts that support Teams redirection (see  https://docs.microsoft.com/en-us/azure/virtual-desktop/teams-on-avd\
      \ for more details).\n\nNote that starting from this release we only support\
      \ iOS 26.\n\nIf you encounter any errors, you can contact us via Settings >\
      \ Submit Feedback."
    version: 11.3.0
