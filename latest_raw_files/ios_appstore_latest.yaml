    releaseNotes: "This version of the Warehouse Management mobile app introduces\
      \ the following fixes and improvements:\n\u2022 Improved authentication for\
      \ iOS.\n\u2022 Fixed an issue where a toast message blocked scanning on iOS.\n\
      \u2022 Implemented new scrollable details card settings.\_ This option allows\
      \ the details card to be scrolled, so you can view more information on one screen.\
      \ The scrollable details card is designed for larger screens. On smaller devices,\
      \ the feature may not work as expected. On smaller screens, switching to landscape\
      \ mode may reduce the available space, which could affect scrollable behavior.\n\
      \u2022 Fixed an issue where the keyboard covered the bottom buttons on the Edit\
      \ Connection page on iOS\n\u2022 Fixed an issue that caused the error message\
      \ to be displayed twice consecutively during blind cycle count.\n\u2022 Fixed\
      \ an issue that caused random animation crashes on older devices.\n\u2022 Expanded\
      \ device compatibility to allow more device types to install the app.\n\u2022\
      \ Improved performance.\n\u2022 Fix bug where step banner displayed the generic\
      \ placeholder \"Scan or enter here\" instead of showing the value from the step."
